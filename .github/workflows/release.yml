name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 9.0.x

      - name: Test
        run: dotnet test tests/Jellyfin.Plugin.LiteTv.Tests

      - name: Build
        run: dotnet publish src/Jellyfin.Plugin.LiteTv -c Release -o publish

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir package
          cp publish/Jellyfin.Plugin.LiteTv.dll package/
          cp publish/Newtonsoft.Json.dll package/
          cp meta.json package/
          (cd package && zip "../litetv-channels_${VERSION}.zip" ./*)
          echo "MD5 checksum for manifest.json:"
          md5sum "litetv-channels_${VERSION}.zip"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: litetv-channels_*.zip
          generate_release_notes: true
